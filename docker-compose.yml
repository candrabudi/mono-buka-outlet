version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: franchise-db
    environment:
      POSTGRES_DB: franchise_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: franchise-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: franchise_db
      DB_SSLMODE: disable
      APP_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

  admin:
    image: node:20-alpine
    container_name: franchise-admin
    working_dir: /app
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/panel:/app
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  pgdata:
  uploads:
